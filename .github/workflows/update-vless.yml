name: Update VLESS Subscription

on:
  schedule:
    - cron: '0 */5 * * *'     # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run subscription updater
        run: python update_subscription.py

      - name: Always update & commit subscription.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Force Git to see the file as changed
          git add subscription.txt
          git commit -m "Update subscription: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No new changes to commit (or already up to date)"
          git push
          echo "✅ Subscription updated (or already current)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
